<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OneCredit</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0f0f11 0%, #1a1a1f 100%);
      color: #e0e0e8;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
    }
    .logo {
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: bold;
      font-size: 12px;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
    }
    .status {
      padding: 12px;
      background: #1a1a1f;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 12px;
    }
    .status.active {
      background: #10b981/10;
      border-color: #10b981/50;
      color: #6ee7b7;
    }
    .buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    button {
      padding: 10px 16px;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover {
      opacity: 0.9;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">OC</div>
    <h1>OneCredit</h1>
  </div>

  <div class="status" id="status">
    Waiting for product page...
  </div>

  <div class="buttons">
    <button id="openPortal">Open Transaction Portal</button>
    <button id="settings">Settings</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
